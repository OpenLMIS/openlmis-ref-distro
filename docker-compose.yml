services:
  # ----------------------------------------------------------------
  # 1. CORE INFRASTRUCTURE
  # ----------------------------------------------------------------

  service-configuration:
    build:
      context: ./config
    volumes:
      - service-config:/config

  consul:
    command: -server -bootstrap
    image: gliderlabs/consul-server
    ports:
      - "8300"
      - "8400"
      - "8500:8500"
      - "53"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-s", "http://127.0.0.1:8500/v1/status/leader" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  db:
    image: openlmis/postgres:${OL_POSTGRES_VERSION}
    command: postgres -c 'max_connections=500'
    env_file: settings.env
    ports:
      - "5432:5432"
    depends_on:
      consul:
        condition: service_healthy

  log:
    image: openlmis/rsyslog:${OL_RSYSLOG_VERSION}
    volumes:
      - syslog:/var/log
    depends_on:
      service-configuration:
        condition: service_completed_successfully
      consul:
        condition: service_healthy

  redis:
    image: redis:3.2.12
    depends_on:
      consul:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 2. WEB & INTERFACE LAYERS
  # ----------------------------------------------------------------

  nginx:
    image: openlmis/nginx:${OL_NGINX_VERSION}
    ports:
      - "${OL_HTTP_PORT:-80}:80"
    env_file: settings.env
    environment:
      NGINX_LOG_DIR: '/var/log/nginx/log'
    volumes:
      - nginx-log:/var/log/nginx/log
      - consul-template-log:/var/log/consul-template
    depends_on:
      consul:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 20000
        hard: 40000

  reference-ui:
    image: openlmis/reference-ui:${OL_REFERENCE_UI_VERSION}
    env_file: settings.env
    depends_on:
      consul:
        condition: service_healthy

  ftp:
    image: driesva/proftpd
    ports:
      - "${OL_FTP_PORT_21:-21}:21"
      - "${OL_FTP_PORT_20:-20}:20"
    env_file: settings.env
    depends_on:
      consul:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 3. BACKEND APPLICATIONS
  # ----------------------------------------------------------------

  requisition:
    image: openlmis/requisition:${OL_REQUISITION_VERSION}
    env_file: settings.env
    environment:
      JAVA_OPTS: >-
        -Xms1024m
        -Xmx1024m
        -Djava.security.egd=file:/dev/./urandom
        -Dlogging.config=/config/log/logback.xml
    volumes:
      - service-config:/config:ro
    depends_on:
      service-configuration:
        condition: service_completed_successfully
      consul:
        condition: service_healthy
      log:
        condition: service_started
      db:
        condition: service_started

  referencedata:
