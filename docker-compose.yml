services:
  # ----------------------------------------------------------------
  # 1. CORE INFRASTRUCTURE
  # ----------------------------------------------------------------

  service-configuration:
    build:
      context: ./config
    volumes:
      - service-config:/config

  consul:
    image: hashicorp/consul:${OL_CONSUL_VERSION}
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
     - "8300:8300"     # Server RPC (Internal)
     - "8500:8500"     # HTTP API & Web UI
     - "8600:8600/tcp" # DNS (Replaces port 53)
     - "8600:8600/udp" # DNS (Replaces port 53)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 30s
      timeout: 5s
      retries: 10

  db:
    image: openlmis/postgres:${OL_POSTGRES_VERSION}
    command: postgres -c 'max_connections=500'
    env_file: settings.env
    ports:
      - "5432:5432"
    depends_on:
      consul:
        condition: service_healthy

  log:
    image: openlmis/rsyslog:${OL_RSYSLOG_VERSION}
    volumes:
      - syslog:/var/log
    depends_on:
      service-configuration:
        condition: service_completed_successfully
      consul:
        condition: service_healthy

  redis:
    image: redis:3.2.12
    depends_on:
      consul:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 2. WEB & INTERFACE LAYERS
  # ----------------------------------------------------------------

  nginx:
    image: openlmis/nginx:${OL_NGINX_VERSION}
    ports:
      - "${OL_HTTP_PORT:-80}:80"
    env_file: settings.env
    environment:
      NGINX_LOG_DIR: '/var/log/nginx/log'
    volumes:
      - nginx-log:/var/log/nginx/log
      - consul-template-log:/var/log/consul-template
    depends_on:
      consul:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 20000
        hard: 40000

  reference-ui:
    image: openlmis/reference-ui:${OL_REFERENCE_UI_VERSION}
    env_file: settings.env
    depends_on:
      consul:
        condition: service_healthy
      # Services from which data is being taken during logging in
      referencedata:
        condition: service_healthy
      auth:
        condition: service_healthy
      notification:
        condition: service_healthy
      report:
        condition: service_healthy
      fulfillment:
        condition: service_healthy
      stockmanagement:
        condition: service_healthy

  ftp:
    image: driesva/proftpd
    ports:
      - "${OL_FTP_PORT_21:-21}:21"
      - "${OL_FTP_PORT_20:-20}:20"
    env_file: settings.env
    depends_on:
      consul:
        condition: service_healthy

  # ----------------------------------------------------------------
  # 3. BACKEND APPLICATIONS
  # ----------------------------------------------------------------

  requisition:
    image: openlmis/requisition:${OL_REQUISITION_VERSION}
    env_file: settings.env
    environment:
      JAVA_OPTS: >-
        -Xms1024m
        -Xmx1024m
        -Djava.security.egd=file:/dev/./urandom
        -Dlogging.config=/config/log/logback.xml
    volumes:
      - service-config:/config:ro
    depends_on:
      service-configuration:
        condition: service_completed_successfully
      consul:
        condition: service_healthy
      log:
        condition: service_started
      db:
        condition: service_started
    healthcheck:
      test: "wget --spider http://localhost:8080/actuator/health || exit 1"
      interval: 30s
      timeout: 5s
      retries: 10

  referencedata:
